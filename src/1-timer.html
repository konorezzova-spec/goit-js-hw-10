<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Timer</title>
    
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css"
        integrity="sha512-O03ntXoVqaGUTAeAmvQ2YSzkCvclZEcPQu1eqloPaHfJ5RuNGiS4l+3duaidD801P50J28EHyonCV06CUlTSag=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"> -->
    
    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
    <load src="./partials/header.html" icon-path="./img/sprite.svg#logo" highlight-act="active" />

    <main>
        <div class="container">
            <input class="input-date" type="text" id="datetime-picker" />
            <button class="button-start" type="button" data-start>Start</button>
            
            <div class="timer">
                <div class="field">
                    <span class="value" 
                    data-days>00</span>
                    <span class="label">Days</span>
                </div>
                <div class="field">
                    <span class="value" 
                    data-hours>00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="field">
                    <span class="value" 
                    data-minutes>00</span>
                    <span class="label">Minutes</span>
                </div>
                <div class="field">
                    <span class="value" 
                    data-seconds>00</span>
                    <span class="label">Seconds</span>
                </div>
            </div>

            <load src="./partials/back-link.html" />
        </div>
    </main>

    <script type="module" src="./js/1-timer.js"></script>
</body>

</html>
