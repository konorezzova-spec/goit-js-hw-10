<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Timer</title>
  <script type="module" crossorigin src="/vanilla-app-template/1-timer.js"></script>
  <link rel="modulepreload" crossorigin href="/vanilla-app-template/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/vanilla-app-template/assets/vendor-Dov3POoy.js">
  <link rel="stylesheet" crossorigin href="/vanilla-app-template/assets/styles-B1E-9NrV.css">
</head>

<body>
    <header class="header">
  <div class="container">
    <nav class="nav">
      <a class="nav-logo" href="./index.html" aria-label="Site logo">
        <svg class="nav-logo-icon" width="100" height="30">
          <use href="/vanilla-app-template/assets/sprite-E8vg0sBb.svg#logo"></use>
        </svg>
      </a>
      <ul class="nav-list">
        <li class="nav-item">
          <a class="nav-link active" href="./1-timer.html">Timer</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {=$highlight-curr}" href="./2-snackbar.html">Snackbar</a>
        </li>
      </ul>
    </nav>
  </div>
</header>


    <main>
        <div class="container">
            <input class="input-date" type="text" id="datetime-picker" />
            <button class="button-start" type="button" data-start>Start</button>
            
            <div class="timer">
                <div class="field">
                    <span class="value" 
                    data-days>00</span>
                    <span class="label">Days</span>
                </div>
                <div class="field">
                    <span class="value" 
                    data-hours>00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="field">
                    <span class="value" 
                    data-minutes>00</span>
                    <span class="label">Minutes</span>
                </div>
                <div class="field">
                    <span class="value" 
                    data-seconds>00</span>
                    <span class="label">Seconds</span>
                </div>
            </div>

            <a class="back-link" href="./index.html">Go back</a>

        </div>
    </main>

</body>

</html>
